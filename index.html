:root{
  --ink:#2B1220;
  --ink-2:#1C0B14;
  --paper:#F5E6DA;
  --paper-dark:#EBD3C2;
  --paper-line:#d8b9a4;
  --rose:#B5495B;
  --rose-dark:#8C2F3F;
  --gold:#C9A24B;
  --sage:#6E7B58;
  --text:#3A2320;
  --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(circle at 15% 15%, #3a1826 0%, transparent 45%),
    radial-gradient(circle at 90% 85%, #331522 0%, transparent 50%),
    var(--ink);
  min-height:100vh;
  font-family:var(--sans);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 12px;
}
.frame{
  width:100%;
  max-width:480px;
  background:var(--paper);
  border-radius:6px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(0,0,0,.3);
  overflow:hidden;
  border:1px solid #00000022;
}
.top{
  background:var(--ink-2);
  color:var(--gold);
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.stage{position:relative; min-height:560px; padding:18px;}

h1.section-title{font-family:var(--serif); font-size:20px; color:var(--rose-dark); margin:0 0 6px 0;}
p.section-text{font-size:13px; margin:0 0 14px 0; color:var(--text);}

.level-grid{
  display:grid; grid-template-columns:repeat(4, 1fr); gap:8px;
  width:100%; max-width:340px; margin:0 auto 6px auto;
}
.level-btn{
  aspect-ratio:1; border-radius:8px; border:2px solid var(--rose-dark);
  background:var(--paper-dark); color:var(--rose-dark);
  font-family:var(--serif); font-size:17px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer;
}
.level-btn small{font-size:8px; font-family:var(--sans); text-transform:uppercase; letter-spacing:.03em; margin-top:2px;}
.level-btn.locked{opacity:.4; cursor:not-allowed; border-style:dashed;}
.level-btn.done{background:var(--rose); color:var(--paper);}

.hud-row{display:flex; justify-content:space-between; align-items:center; font-family:var(--serif); font-size:14px; color:var(--rose-dark); margin-bottom:10px;}

.wordsearch-grid{
  display:grid;
  gap:2px;
  margin:0 auto 16px auto;
  width:100%;
  max-width:420px;
}
.ws-cell{
  aspect-ratio:1;
  background:var(--paper-dark);
  border:1px solid var(--paper-line);
  border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--sans); font-weight:600; font-size:10.5px;
  cursor:pointer;
  user-select:none;
}
.ws-cell.selected{background:var(--gold); color:var(--ink-2);}
.ws-cell.found{background:var(--rose); color:var(--paper); cursor:default;}

.word-list{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;}
.word-chip{
  font-size:10.5px; font-family:var(--sans); text-transform:uppercase; letter-spacing:.02em;
  padding:5px 9px; border-radius:12px; border:1px solid var(--paper-line);
  color:var(--text);
}
.word-chip.found{background:var(--rose); color:var(--paper); border-color:var(--rose); text-decoration:line-through;}

.puzzle-wrap{display:none; text-align:center;}
.puzzle-wrap.show{display:block;}
.puzzle-grid{
  display:grid; grid-template-columns:repeat(3, 1fr); gap:4px;
  width:100%; max-width:270px; margin:0 auto 16px auto;
}
.tile{
  aspect-ratio:1; border-radius:6px; border:2px solid var(--rose-dark);
  background:var(--paper-dark); color:var(--rose-dark);
  font-family:var(--serif); font-size:24px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.tile.blank{visibility:hidden;}

.btn{
  font-family:var(--sans); letter-spacing:.06em; text-transform:uppercase; font-size:12px;
  background:var(--ink-2); color:var(--gold); border:none; padding:13px 26px;
  border-radius:3px; cursor:pointer; margin:4px;
}
.btn.ghost{background:transparent; color:var(--rose-dark); border:1px solid var(--rose-dark);}

.overlay{
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:22px;
  background:rgba(245,230,218,.97);
}
.overlay.hidden{display:none;}
.overlay h1{font-family:var(--serif); font-size:22px; margin:0 0 8px 0; color:var(--rose-dark);}
.overlay p{font-size:14px; color:var(--text); margin:0 0 16px 0; line-height:1.5;}

.footer-hint{
  text-align:center; font-size:11px; color:#7a5560; padding:10px; letter-spacing:.04em;
  background:var(--ink-2);
}
</style>
</head>
<body>

<div class="frame">
  <div class="top">
    <span id="topLeft">BUSCA Y ARMA</span>
    <span id="topRight">♥</span>
  </div>
  <div class="stage">

    <div id="mapScreen">
      <h1 class="section-title" id="mapTitle">Elige un nivel</h1>
      <p class="section-text" id="mapText"></p>
      <div class="level-grid" id="levelGrid"></div>
    </div>

    <div id="wordSearchScreen" style="display:none;">
      <div class="hud-row">
        <span id="wsLevelName">Nivel 1</span>
        <span id="wsProgress">0 / 0</span>
      </div>
      <div class="wordsearch-grid" id="wsGrid"></div>
      <div class="word-list" id="wordList"></div>
    </div>

    <div class="puzzle-wrap" id="puzzleScreen">
      <h1 class="section-title" id="puzzleTitle">Arma la frase</h1>
      <p class="section-text" id="puzzleText">Desliza las fichas hasta ordenar la frase.</p>
      <div class="puzzle-grid" id="puzzleGrid"></div>
    </div>

    <div class="overlay hidden" id="completeScreen">
      <h1 id="completeTitle">¡Nivel superado!</h1>
      <p id="completeText"></p>
      <button class="btn" id="nextLevelBtn" onclick="playNextLevel()">Siguiente nivel</button>
      <button class="btn ghost" onclick="goToMap()">Volver al mapa</button>
    </div>
  </div>
  <div class="footer-hint" id="footerHint">Toca la primera y última letra de cada palabra</div>
</div>

function shuffle(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// reparte 7 palabras únicas por nivel, sin repetir entre niveles
(function repartirPalabras(){
  const pool = shuffle(CONTENT.palabrasPool.slice());
  const perLevel = 7;
  CONTENT.niveles.forEach((lvl, i) => {
    lvl.palabras = pool.slice(i * perLevel, i * perLevel + perLevel);
  });
})();

const GRID_SIZE = 14;
let currentLevel = 0;
let completed = new Set(); // se reinicia al recargar la página (no persiste)
let wsGridData = [];
let wsFound = new Set();
let wsSelection = [];
let puzzleTarget = [];
let puzzleBoard = [];

function buildLevelGrid(){
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  CONTENT.niveles.forEach((lvl, i) => {
    const unlocked = i === 0 || completed.has(i-1);
    const done = completed.has(i);
    const b = document.createElement('button');
    b.className = 'level-btn' + (unlocked ? '' : ' locked') + (done ? ' done' : '');
    b.innerHTML = (done ? '✓' : (unlocked ? (i+1) : '🔒')) + '<small>' + (i+1) + '</small>';
    if (unlocked){ b.onclick = () => playLevel(i); }
    grid.appendChild(b);
  });
}

function showScreen(name){
  document.getElementById('mapScreen').style.display = name === 'map' ? 'block' : 'none';
  document.getElementById('wordSearchScreen').style.display = name === 'ws' ? 'block' : 'none';
  document.getElementById('puzzleScreen').classList.toggle('show', name === 'puzzle');
  document.getElementById('completeScreen').classList.toggle('hidden', name !== 'complete');
  document.getElementById('footerHint').textContent = name === 'puzzle'
    ? 'Toca una ficha junto al espacio vacío para moverla'
    : 'Toca la primera y última letra de cada palabra (en cualquier dirección)';
}

function goToMap(){
  showScreen('map');
  buildLevelGrid();
}

function randLetter(){
  const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  return letras[Math.floor(Math.random()*letras.length)];
}

const DIRECCIONES = [
  {dr:0, dc:1},   // horizontal derecha
  {dr:1, dc:0},   // vertical abajo
  {dr:1, dc:1},   // diagonal abajo-derecha
  {dr:1, dc:-1}   // diagonal abajo-izquierda
];

function buildWordSearch(palabras){
  const size = GRID_SIZE;
  const grid = Array.from({length:size}, () => Array(size).fill(null));

  palabras.forEach(p => {
    const w = p.w.toUpperCase();
    let placed = false;
    let attempts = 0;
    while (!placed && attempts < 400){
      attempts++;
      const dir = DIRECCIONES[Math.floor(Math.random()*DIRECCIONES.length)];
      const row = Math.floor(Math.random()*size);
      const col = Math.floor(Math.random()*size);
      const endRow = row + dir.dr * (w.length - 1);
      const endCol = col + dir.dc * (w.length - 1);
      if (endRow < 0 || endRow >= size || endCol < 0 || endCol >= size) continue;

      let fits = true;
      for (let k = 0; k < w.length; k++){
        const r = row + dir.dr * k;
        const c = col + dir.dc * k;
        const existing = grid[r][c];
        if (existing !== null && existing !== w[k]){ fits = false; break; }
      }
      if (fits){
        for (let k = 0; k < w.length; k++){
          const r = row + dir.dr * k;
          const c = col + dir.dc * k;
          grid[r][c] = w[k];
        }
        placed = true;
      }
    }
  });

  for (let r = 0; r < size; r++){
    for (let c = 0; c < size; c++){
      if (grid[r][c] === null) grid[r][c] = randLetter();
    }
  }
  return grid;
}

function playLevel(i){
  currentLevel = i;
  const lvl = CONTENT.niveles[i];
  wsGridData = buildWordSearch(lvl.palabras);
  wsFound = new Set();
  wsSelection = [];

  document.getElementById('wsLevelName').textContent = lvl.nombre;
  updateWsProgress();

  const wsGrid = document.getElementById('wsGrid');
  wsGrid.style.gridTemplateColumns = 'repeat(' + GRID_SIZE + ', 1fr)';
  wsGrid.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++){
    for (let c = 0; c < GRID_SIZE; c++){
      const cell = document.createElement('div');
      cell.className = 'ws-cell';
      cell.textContent = wsGridData[r][c];
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.onclick = () => handleCellTap(r, c, cell);
      wsGrid.appendChild(cell);
    }
  }

  const wordList = document.getElementById('wordList');
  wordList.innerHTML = '';
  lvl.palabras.forEach(p => {
    const chip = document.createElement('span');
    chip.className = 'word-chip';
    chip.textContent = p.label;
    chip.dataset.word = p.w.toUpperCase();
    wordList.appendChild(chip);
  });

  showScreen('ws');
}

function updateWsProgress(){
  const lvl = CONTENT.niveles[currentLevel];
  document.getElementById('wsProgress').textContent = wsFound.size + ' / ' + lvl.palabras.length;
}

function cellsBetween(a, b){
  const dr = b.r - a.r, dc = b.c - a.c;
  if (dr === 0 && dc === 0) return null;
  if (dr !== 0 && dc !== 0 && Math.abs(dr) !== Math.abs(dc)) return null;
  const steps = Math.max(Math.abs(dr), Math.abs(dc));
  const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
  const stepC = dc === 0 ? 0 : dc / Math.abs(dc);
  const cells = [];
  for (let i = 0; i <= steps; i++){
    cells.push({ r: a.r + stepR*i, c: a.c + stepC*i });
  }
  return cells;
}

function handleCellTap(r, c, el){
  if (wsSelection.length === 0){
    wsSelection.push({r, c, el});
    el.classList.add('selected');
    return;
  }

  const first = wsSelection[0];
  if (first.r === r && first.c === c){
    first.el.classList.remove('selected');
    wsSelection = [];
    return;
  }

  const path = cellsBetween(first, {r, c});
  first.el.classList.remove('selected');
  wsSelection = [];
  if (!path) return;

  const letters = path.map(p => wsGridData[p.r][p.c]).join('');
  const reversed = letters.split('').reverse().join('');
  const lvl = CONTENT.niveles[currentLevel];
  const match = lvl.palabras.find(p => {
    const W = p.w.toUpperCase();
    return (W === letters || W === reversed) && !wsFound.has(W);
  });

  if (match){
    wsFound.add(match.w.toUpperCase());
    path.forEach(p => {
      const cellEl = document.querySelector('.ws-cell[data-r="'+p.r+'"][data-c="'+p.c+'"]');
      cellEl.classList.add('found');
    });
    const chip = document.querySelector('.word-chip[data-word="'+match.w.toUpperCase()+'"]');
    if (chip) chip.classList.add('found');
    updateWsProgress();
    if (wsFound.size === lvl.palabras.length){
      setTimeout(() => startPuzzle(lvl), 500);
    }
  }
}

function startPuzzle(lvl){
  if (lvl.imagen){
    puzzleTarget = [0,1,2,3,4,5,6,7]; // posiciones originales de las 8 piezas
  } else {
    let phrase = lvl.frase.toUpperCase().replace(/[^A-ZÑÁÉÍÓÚ]/g, '');
    while (phrase.length < 8) phrase += '♥';
    phrase = phrase.slice(0, 8);
    puzzleTarget = phrase.split('');
  }

  puzzleBoard = puzzleTarget.slice();
  puzzleBoard.push(null); // blank al final = estado resuelto

  for (let i = 0; i < 20; i++){
    const blankIdx = puzzleBoard.indexOf(null);
    const neighbors = getNeighbors(blankIdx);
    const swapWith = neighbors[Math.floor(Math.random()*neighbors.length)];
    [puzzleBoard[blankIdx], puzzleBoard[swapWith]] = [puzzleBoard[swapWith], puzzleBoard[blankIdx]];
  }

  renderPuzzle();
  showScreen('puzzle');
}

function getNeighbors(idx){
  const row = Math.floor(idx/3), col = idx%3;
  const n = [];
  if (row > 0) n.push(idx-3);
  if (row < 2) n.push(idx+3);
  if (col > 0) n.push(idx-1);
  if (col < 2) n.push(idx+1);
  return n;
}

function renderPuzzle(){
  const grid = document.getElementById('puzzleGrid');
  const lvl = CONTENT.niveles[currentLevel];
  grid.innerHTML = '';
  puzzleBoard.forEach((val, idx) => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (val === null ? ' blank' : '');
    if (lvl.imagen && val !== null){
      const col = val % 3, row = Math.floor(val / 3);
      tile.style.backgroundImage = 'url(' + lvl.imagenSrc + ')';
      tile.style.backgroundSize = '300% 300%';
      tile.style.backgroundPosition = (col*50) + '% ' + (row*50) + '%';
      tile.textContent = '';
    } else {
      tile.textContent = val === null ? '' : val;
    }
    tile.onclick = () => tapTile(idx);
    grid.appendChild(tile);
  });
}

function tapTile(idx){
  const blankIdx = puzzleBoard.indexOf(null);
  const neighbors = getNeighbors(blankIdx);
  if (!neighbors.includes(idx)) return;
  [puzzleBoard[blankIdx], puzzleBoard[idx]] = [puzzleBoard[idx], puzzleBoard[blankIdx]];
  renderPuzzle();

  const solved = puzzleBoard.slice(0, 8).every((v, i) => v === puzzleTarget[i]);
  if (solved){
    setTimeout(levelComplete, 350);
  }
}

function levelComplete(){
  completed.add(currentLevel);
  const lvl = CONTENT.niveles[currentLevel];
  document.getElementById('completeTitle').textContent = lvl.nombre + ' superado';
  document.getElementById('completeText').textContent = lvl.mensaje;
  document.getElementById('nextLevelBtn').style.display = (currentLevel + 1 < CONTENT.niveles.length) ? 'inline-block' : 'none';
  showScreen('complete');
}

function playNextLevel(){
  if (currentLevel + 1 < CONTENT.niveles.length){
    playLevel(currentLevel + 1);
  } else {
    goToMap();
  }
}

buildLevelGrid();

// Registra el service worker para que funcione sin internet después de la primera visita.
if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
